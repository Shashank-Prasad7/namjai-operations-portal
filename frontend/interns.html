<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interns - Namjai Operations Portal</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">📊 Namjai Ops</a>
            <button class="nav-toggle" id="navToggle">☰</button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="volunteers.html">Volunteers</a></li>
                <li><a href="camps.html">Camps</a></li>
                <li><a href="referrals.html">Referrals</a></li>
                <li><a href="partners.html">Partners</a></li>
                <li><a href="interns.html" class="active">Interns</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>👨‍🎓 Interns Module</h1>
            <p class="subtitle">Track university interns and their progress</p>
        </div>

        <!-- Certificate Summary -->
        <div class="status-summary" id="internStatusSummary">
            <!-- Injected by JavaScript -->
        </div>

        <div class="filter-bar">
            <input type="text" id="internSearch" placeholder="🔍 Search by name or college..." class="search-input" />
            <select id="internStatusFilter" class="filter-select">
                <option value="all">All Status</option>
                <option value="Completed">Completed</option>
                <option value="Ongoing">Ongoing</option>
            </select>
            <select id="internCollegeFilter" class="filter-select">
                <option value="all">All Colleges</option>
                <option value="ABC College">ABC College</option>
                <option value="DEF Univ">DEF Univ</option>
                <option value="GHI College">GHI College</option>
                <option value="JKL Univ">JKL Univ</option>
                <option value="MNO College">MNO College</option>
            </select>
        </div>

        <div class="table-container">
            <table id="internTable">
                <thead>
                    <tr>
                        <th>Intern ID</th>
                        <th>Name</th>
                        <th>College</th>
                        <th>Project</th>
                        <th>Status</th>
                        <th>Certificate</th>
                    </tr>
                </thead>
                <tbody id="internTableBody">
                    <!-- Injected by JavaScript -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>

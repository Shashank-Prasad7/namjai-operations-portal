<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Referrals - Namjai Operations Portal</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">📊 Namjai Ops</a>
            <button class="nav-toggle" id="navToggle">☰</button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="volunteers.html">Volunteers</a></li>
                <li><a href="camps.html">Camps</a></li>
                <li><a href="referrals.html" class="active">Referrals</a></li>
                <li><a href="partners.html">Partners</a></li>
                <li><a href="interns.html">Interns</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>🩺 Referral Tracker</h1>
            <p class="subtitle">Track patient referrals from camps</p>
        </div>

        <!-- Status Summary -->
        <div class="status-summary" id="referralStatusSummary">
            <!-- Injected by JavaScript -->
        </div>

        <div class="filter-bar">
            <input type="text" id="referralSearch" placeholder="🔍 Search by beneficiary code..." class="search-input" />
            <select id="referralStatusFilter" class="filter-select">
                <option value="all">All Status</option>
                <option value="Pending">Pending</option>
                <option value="Scheduled">Scheduled</option>
                <option value="Visited">Visited</option>
                <option value="Treated">Treated</option>
                <option value="Closed">Closed</option>
            </select>
        </div>

        <div class="table-container">
            <table id="referralTable">
                <thead>
                    <tr>
                        <th>Referral ID</th>
                        <th>Camp ID</th>
                        <th>Beneficiary Code</th>
                        <th>Referred To</th>
                        <th>Referral Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="referralTableBody">
                    <!-- Injected by JavaScript -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>

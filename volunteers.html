<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volunteers - Namjai Operations Portal</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- ===== NAVIGATION ===== -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">📊 Namjai Ops</a>
            <button class="nav-toggle" id="navToggle">☰</button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="volunteers.html" class="active">Volunteers</a></li>
                <li><a href="camps.html">Camps</a></li>
                <li><a href="referrals.html">Referrals</a></li>
                <li><a href="partners.html">Partners</a></li>
                <li><a href="interns.html">Interns</a></li>
            </ul>
        </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="container">
        <div class="page-header">
            <h1>👥 Volunteers Directory</h1>
            <p class="subtitle">Search, filter, and view volunteer profiles</p>
        </div>

        <!-- ===== SEARCH & FILTERS ===== -->
        <div class="filter-bar">
            <input type="text" id="volunteerSearch" placeholder="🔍 Search by name, email, or city..." class="search-input" />
            <select id="volunteerTypeFilter" class="filter-select">
                <option value="all">All Types</option>
                <option value="Volunteer">Volunteer</option>
                <option value="Intern">Intern</option>
                <option value="Medical Volunteer">Medical Volunteer</option>
            </select>
            <select id="volunteerStatusFilter" class="filter-select">
                <option value="all">All Status</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
                <option value="Alumni">Alumni</option>
            </select>
            <select id="volunteerLaneFilter" class="filter-select">
                <option value="all">All Lanes</option>
                <option value="Ground Operations">Ground Operations</option>
                <option value="Medical">Medical</option>
                <option value="Dental">Dental</option>
                <option value="Technology">Technology</option>
                <option value="Outreach & Partnerships">Outreach & Partnerships</option>
                <option value="Fundraising">Fundraising</option>
            </select>
        </div>

        <!-- ===== VOLUNTEER TABLE ===== -->
        <div class="table-container">
            <table id="volunteerTable">
                <thead>
                    <tr>
                        <th>Volunteer ID</th>
                        <th>Full Name</th>
                        <th>Type</th>
                        <th>Lane</th>
                        <th>Status</th>
                        <th>City</th>
                    </tr>
                </thead>
                <tbody id="volunteerTableBody">
                    <!-- Injected by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- ===== PAGINATION ===== -->
        <div class="pagination" id="volunteerPagination">
            <span id="volunteerCount">Showing 0 of 0</span>
            <div>
                <button id="prevPageBtn" disabled>Prev</button>
                <button id="nextPageBtn">Next</button>
            </div>
        </div>

        <!-- ===== VOLUNTEER PROFILE MODAL ===== -->
        <div class="modal" id="volunteerModal">
            <div class="modal-content">
                <span class="modal-close" id="volunteerModalClose">&times;</span>
                <h2 id="modalName">Volunteer Name</h2>
                <div id="modalDetails">
                    <!-- Injected by JavaScript -->
                </div>
            </div>
        </div>
    </main>

    
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
